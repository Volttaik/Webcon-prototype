kind = "web"
previewPath = "/"
title = "Webcon App"
version = "1.0.0"
id = "artifacts/webcon-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22817

[services.development]
run = "pnpm --filter @workspace/webcon-app run dev"

[services.production]

[services.production.build]
args = ["pnpm", "--filter", "@workspace/webcon-app", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
args = ["pnpm", "--filter", "@workspace/webcon-app", "run", "start"]

[services.production.run.env]
PORT = "22817"
NODE_ENV = "production"

[services.production.health.startup]
path = "/api/healthz"

[services.env]
PORT = "22817"
BASE_PATH = "/"
